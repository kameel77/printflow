# PrintFlow MIS — Dev deployment (Coolify / Docker Compose)
# Services: PostgreSQL, Redis, Backend (FastAPI), Frontend (Next.js)

services:
  # ─── Backend (FastAPI) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://printflow:printflow123@postgres:5432/printflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-characters-long}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

    expose:
      - "8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - coolify
    command: >
      sh -c "
        echo 'Wait 3s for DB/DNS...' && sleep 3 &&
        python -c 'import asyncpg; print(\"asyncpg OK\")' &&
        echo '=== Running Alembic migrations ===' &&
        (alembic upgrade head || (echo 'Tables exist, stamping...' && alembic stamp head)) &&
        python -m app.seed || echo 'WARN: seed failed, continuing...' &&
        echo '=== Starting uvicorn ===' &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # ─── Frontend (Next.js) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started
    # Disable inherited healthcheck to prevent 503 errors
    healthcheck:
      test: [ "NONE" ]
    networks:
      - coolify

networks:
  coolify:
    external: true
