version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: printflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-printflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-printflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-printflow}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery task queue and caching
  redis:
    image: redis:7-alpine
    container_name: printflow_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # ports:
    #   - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: printflow_backend
    restart: unless-stopped
    working_dir: /app
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://printflow:printflow123@postgres:5432/printflow}
      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      # Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Gmail API
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/credentials/gmail_credentials.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/credentials/gmail_token.json}
      # Environment
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # PDF Generation
      WEASYPRINT_TIMEOUT: ${WEASYPRINT_TIMEOUT:-30}
      # Follow-up settings
      FOLLOW_UP_DAYS: ${FOLLOW_UP_DAYS:-3}
      MAX_FOLLOW_UPS: ${MAX_FOLLOW_UPS:-2}
    volumes:
      - ./credentials:/app/credentials:ro
      - pdf_storage:/app/storage/pdfs
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    expose:
      - 8000
    # ports:
    #   - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "

  # Celery Worker for background tasks
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: printflow_celery_worker
    restart: unless-stopped
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://printflow:printflow123@postgres:5432/printflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/credentials/gmail_credentials.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/credentials/gmail_token.json}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FOLLOW_UP_DAYS: ${FOLLOW_UP_DAYS:-3}
      MAX_FOLLOW_UPS: ${MAX_FOLLOW_UPS:-2}
    volumes:
      - ./credentials:/app/credentials:ro
      - pdf_storage:/app/storage/pdfs
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    depends_on:
      - postgres
      - redis
      - backend
    command: >
      sh -c "
        celery -A app.core.celery worker --loglevel=info --concurrency=4
      "

  # Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: printflow_celery_beat
    restart: unless-stopped
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://printflow:printflow123@postgres:5432/printflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/credentials/gmail_credentials.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/credentials/gmail_token.json}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FOLLOW_UP_DAYS: ${FOLLOW_UP_DAYS:-3}
      MAX_FOLLOW_UPS: ${MAX_FOLLOW_UPS:-2}
    volumes:
      - ./credentials:/app/credentials:ro
      - pdf_storage:/app/storage/pdfs
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    depends_on:
      - postgres
      - redis
      - backend
    command: >
      sh -c "
        celery -A app.core.celery beat --loglevel=info
      "

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    container_name: printflow_frontend
    restart: unless-stopped
    expose:
      - 3000
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
    depends_on:
      - backend
    healthcheck:
      test: [ "NONE" ]

  # Database backup service
  backup:
    image: postgres:15-alpine
    container_name: printflow_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-printflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-printflow}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    depends_on:
      - postgres
    command: >
      sh -c "
        apk add --no-cache tzdata &&
        echo '0 3 * * * PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/printflow_$$(date +\%Y\%m\%d_\%H\%M\%S).sql.gz && find /backups -name "*.sql.gz" -mtime +$$BACKUP_RETENTION_DAYS -delete' | crontab - &&
        crond -f -l 2
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pdf_storage:
    driver: local
